services:
  mediamtx:
    image: bluenviron/mediamtx:1-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8554:8554/udp"
      - "8080:8080"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
    volumes:
      - ./router/mediamtx.yml:/mediamtx.yml
      - ./recordings:/recordings
  
  db:
    image: postgres:latest
    container_name: postgreSQL
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORTS}:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d

  api:
    build:
      context: ./backend/API
      dockerfile: DockerFile
    container_name: api
    ports:
      - "${API_PORT}:8000"
    env_file:
      - ./backend/API/.env
    restart: always